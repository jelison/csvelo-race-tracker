name: Scrape BikeReg Registrants

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data files back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated data files
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit — data is up to date."
          else
            git commit -m "chore: update race registrant data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
